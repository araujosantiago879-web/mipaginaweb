<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin · El Lado B</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&family=Archivo:wght@400;500;600;700&family=Inconsolata:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#050508; color:#eef2f5; font-family:'Archivo',sans-serif; padding:2rem; }
    .container { max-width:1400px; margin:0 auto; }
    h1 { font-family:'Cormorant Garamond',serif; font-size:3rem; margin-bottom:0.5rem; }
    h1 em { color:#ff3366; font-style:italic; }
    .login-box { max-width:400px; margin:10vh auto; background:#111118; border:1px solid rgba(255,255,255,0.05); padding:2rem; border-radius:12px; }
    .login-box input, .login-box button { width:100%; padding:12px; margin-top:1rem; background:#0a0a10; border:1px solid rgba(255,255,255,0.1); color:#fff; font-family:'Inconsolata'; border-radius:6px; }
    .login-box button { background:#ff3366; cursor:pointer; font-weight:bold; }
    .login-box button:hover { background:#cc2952; }
    .admin-panel { display:none; }
    .tabs { display:flex; gap:1rem; border-bottom:1px solid rgba(255,255,255,0.1); margin-bottom:2rem; flex-wrap:wrap; }
    .tab-btn { background:none; border:none; color:#aaa; padding:0.8rem 1.5rem; cursor:pointer; font-family:'Inconsolata'; font-size:0.9rem; transition:0.2s; }
    .tab-btn.active { color:#ff3366; border-bottom:2px solid #ff3366; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    .productos-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1rem; margin-top:1.5rem; }
    .producto-card { background:#111118; border:1px solid rgba(255,255,255,0.05); padding:1rem; border-radius:8px; transition:0.2s; }
    .producto-card:hover { border-color:#ff336640; }
    .producto-card img { width:100%; height:150px; object-fit:cover; border-radius:6px; background:#0a0a10; }
    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:0.3rem; color:#aaa; }
    .form-group input, .form-group select, .form-group textarea { width:100%; padding:10px; background:#0a0a10; border:1px solid rgba(255,255,255,0.1); color:#eef2f5; font-family:'Inconsolata'; border-radius:6px; }
    button { background:#ff3366; border:none; padding:10px 20px; color:#fff; cursor:pointer; font-weight:bold; border-radius:6px; transition:0.2s; }
    button:hover { background:#cc2952; }
    .btn-secondary { background:#1a1a24; border:1px solid #444; }
    .btn-secondary:hover { background:#2a2a34; }
    .error { color:#ff3366; margin-top:0.5rem; }
    .success { color:#66ffcc; }
    .toast-admin {
      position:fixed; bottom:24px; right:24px; background:#111118; border:1px solid #66ffcc;
      padding:12px 20px; border-radius:40px; display:flex; align-items:center; gap:10px;
      font-size:13px; z-index:9999; transform:translateY(80px); opacity:0;
      transition:all 0.3s; pointer-events:none;
    }
    .toast-admin.show { transform:none; opacity:1; }
    .toast-dot { width:8px; height:8px; background:#66ffcc; border-radius:50%; }
    .loading-spinner { text-align:center; padding:2rem; color:#aaa; }

    /* MODAL */
    .modal-backdrop {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(5,5,8,0.95); backdrop-filter: blur(8px);
      z-index: 1000; display: none; align-items: center; justify-content: center;
    }
    .modal-backdrop.active { display: flex; }
    .modal-container {
      background: #111118; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; width: 90%; max-width: 550px; max-height: 90vh;
      overflow-y: auto; padding: 2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .modal-container h3 { font-size: 1.8rem; margin-bottom: 1.5rem; font-family: 'Cormorant Garamond', serif; }
    .modal-container h3 em { color: #ff3366; font-style: italic; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem; }
    .modal-actions button { margin: 0; }
    .btn-cancel { background: #2a2a34; }
    .btn-cancel:hover { background: #3a3a44; }
    .precio-anterior { color:#ff6666; text-decoration:line-through; font-size:0.85rem; opacity:0.9; margin-left:6px; }

    /* UPLOAD ZONE */
    .upload-zone {
      position: relative;
      border: 2px dashed rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.02);
    }
    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: #ff3366;
      background: rgba(255,51,102,0.05);
    }
    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .upload-zone .upload-icon { font-size: 2rem; }
    .upload-zone .upload-hint { font-size: 0.75rem; color: #888; }

    /* IMAGE ITEMS */
    .img-item {
      position: relative;
      width: 90px;
      height: 90px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    .img-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .img-item .img-remove {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      background: rgba(0,0,0,0.7);
      border: none;
      color: #fff;
      border-radius: 50%;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      padding: 0;
    }
    .img-item .img-remove:hover {
      background: #ff3366;
    }
    .img-item.removing {
      opacity: 0.3;
      filter: grayscale(1);
    }
    .img-item.removing::after {
      content: '✕';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #ff3366;
      background: rgba(0,0,0,0.4);
    }

    /* CARD GALLERY */
    .card-gallery { position: relative; }
    .card-main-img {
      width:100%; height:160px; object-fit:cover; border-radius:6px;
      background:#0a0a10; display:block; transition: opacity 0.2s;
    }
    .card-thumbs {
      display:flex; gap:4px; margin-top:6px; overflow-x:auto;
      padding-bottom:2px;
    }
    .card-thumbs img {
      width:40px; height:40px; object-fit:cover; border-radius:4px;
      border:1px solid rgba(255,255,255,0.1); cursor:pointer;
      flex-shrink:0; transition: 0.15s;
    }
    .card-thumbs img:hover { border-color:#ff3366; }
    .card-thumbs img.active { border-color:#ff3366; box-shadow: 0 0 0 2px #ff3366; }
    .card-img-count {
      position: absolute; bottom:6px; right:6px;
      background: rgba(0,0,0,0.75); color:#fff; font-size:11px;
      padding:2px 8px; border-radius:20px; font-weight:600;
      backdrop-filter: blur(4px);
    }

    /* PASSWORD TOGGLE */
    .pw-field {
      position: relative;
      display: flex;
      align-items: center;
    }
    .pw-field input {
      width: 100%;
      padding-right: 40px;
    }
    .pw-toggle {
      position: absolute;
      right: 8px;
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      line-height: 1;
      transition: 0.2s;
    }
    .pw-toggle:hover { color: #ff3366; }

    /* FORGOT PASSWORD */
    .forgot-link {
      display: block;
      text-align: right;
      font-size: 0.8rem;
      color: #888;
      cursor: pointer;
      margin-top: 6px;
      transition: 0.2s;
      background: none;
      border: none;
      font-family: 'Inconsolata';
    }
    .forgot-link:hover { color: #ff3366; }

    /* SACAR FONDOS DE AUTOFILL DEL NAVEGADOR */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 1000px #0a0a10 inset !important;
      -webkit-text-fill-color: #fff !important;
      box-shadow: 0 0 0 1000px #0a0a10 inset !important;
      caret-color: #fff !important;
    }
    .recovery-box {
      margin-top: 1rem;
      padding: 1rem;
      background: #0a0a10;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      display: none;
    }
    .recovery-box.show { display: block; }
    .recovery-box input, .recovery-box button {
      width: 100%; padding: 10px; margin-top: 8px;
      background: #111118; border: 1px solid rgba(255,255,255,0.1);
      color: #fff; font-family: 'Inconsolata'; border-radius: 6px;
    }
    .recovery-box button { background: #ff3366; cursor: pointer; font-weight: bold; }
    .recovery-box button:hover { background: #cc2952; }
  </style>
</head>
<body>
<div class="container">
  <div class="login-box" id="login-box">
    <h2>🔐 Panel de Administración</h2>
    <input type="text" id="access-password" placeholder="Contraseña de acceso" style="margin-top:1rem; color:#fff; background:#0a0a10; border:1px solid rgba(255,255,255,0.1); padding:12px; width:100%; font-family:'Inconsolata'; border-radius:6px;">
    <input type="text" id="admin-password" placeholder="Contraseña del admin" style="margin-top:0.5rem; color:#fff; background:#0a0a10; border:1px solid rgba(255,255,255,0.1); padding:12px; width:100%; font-family:'Inconsolata'; border-radius:6px;">
    <button id="login-btn">Ingresar</button>
    <button class="forgot-link" id="forgot-link">¿Olvidaste tu contraseña?</button>
    <div id="login-error" class="error"></div>
    <div class="recovery-box" id="recovery-box">
      <div id="recovery-step1">
        <p style="font-size:13px;color:#aaa;" id="recovery-question">Cargando pregunta de seguridad...</p>
        <input type="text" id="recovery-answer" placeholder="Tu respuesta">
        <button id="recovery-btn">Verificar respuesta</button>
        <div id="recovery-error" style="margin-top:8px;font-size:13px;color:#ff3366;"></div>
      </div>
      <div id="recovery-step2" style="display:none;">
        <p style="font-size:13px;color:#66ffcc;">✅ Respuesta correcta. Ahora creá tus nuevas contraseñas:</p>
        <input type="text" id="recovery-new-access" placeholder="Nueva contraseña de acceso" style="margin-top:8px; color:#fff; background:#0a0a10; border:1px solid rgba(255,255,255,0.1); padding:10px; width:100%; font-family:'Inconsolata'; border-radius:6px;">
        <input type="text" id="recovery-new-admin" placeholder="Nueva contraseña del admin" style="margin-top:6px; color:#fff; background:#0a0a10; border:1px solid rgba(255,255,255,0.1); padding:10px; width:100%; font-family:'Inconsolata'; border-radius:6px;">
        <button id="recovery-save-btn" style="margin-top:8px;">Guardar nuevas contraseñas</button>
        <div id="recovery-result" style="margin-top:8px;font-size:13px;"></div>
      </div>
    </div>
  </div>
  <div class="admin-panel" id="admin-panel">
    <h1>El <em>Lado B</em> · Admin</h1>
    <div class="tabs">
      <button class="tab-btn active" data-tab="productos">📦 Productos</button>
      <button class="tab-btn" data-tab="config">⚙️ Configuración</button>
    </div>
    <div id="tab-productos" class="tab-content active">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; flex-wrap:wrap; gap:1rem;">
        <h2>Gestión de productos</h2>
        <button id="btn-nuevo-producto">+ Nuevo producto</button>
      </div>
      <div id="productos-loading" class="loading-spinner">Cargando productos...</div>
      <div class="productos-grid" id="productos-list" style="display:none;"></div>
    </div>
    <div id="tab-config" class="tab-content">
      <h2>Configuración general</h2>
      <div class="form-group"><label>📱 WhatsApp (sin +)</label><input type="text" id="config-whatsapp" placeholder="5492494000000"></div>
      <div class="form-group"><label>🕘 Horario L-V</label><input type="text" id="config-lv"></div>
      <div class="form-group"><label>🕘 Horario Sábados</label><input type="text" id="config-sab"></div>
      <div class="form-group"><label>🕘 Horario Domingos</label><input type="text" id="config-dom"></div>
      <div class="form-group"><label>🕘 Horario Feriados</label><input type="text" id="config-fer"></div>
      <div class="form-group"><label>📢 Ticker (separar por coma)</label><textarea id="config-ticker" rows="3"></textarea></div>
      <div class="form-group"><label>🔑 Cambiar contraseña de acceso</label>
        <input type="text" id="new-access-password" placeholder="Nueva contraseña de acceso" style="color:#fff; background:#0a0a10; border:1px solid rgba(255,255,255,0.1); padding:10px; width:100%; font-family:'Inconsolata'; border-radius:6px;">
      </div>
      <div class="form-group"><label>🔑 Cambiar contraseña admin</label>
        <div class="pw-field">
          <input type="password" id="new-password" placeholder="Nueva contraseña">
          <button class="pw-toggle" id="toggle-new-pw" type="button" title="Ver/ocultar contraseña">👁️</button>
        </div>
      </div>
      <div class="form-group"><label>❓ Pregunta de seguridad (para recuperar contraseña)</label><input type="text" id="config-recovery-question" placeholder="ej: ¿Cuál es tu color favorito?"></div>
      <div class="form-group"><label>🔐 Respuesta (sin mayúsculas ni espacios de más)</label><input type="text" id="config-recovery-answer" placeholder="ej: azul"></div>
      <button id="guardar-config">Guardar configuración</button>
      <div id="config-msg" class="error" style="margin-top:1rem;"></div>
    </div>
  </div>
</div>

<!-- MODAL PARA PRODUCTO -->
<div id="productModal" class="modal-backdrop">
  <div class="modal-container">
    <h3><em>Producto</em></h3>
    <form id="productForm">
      <div class="form-group"><label>Nombre</label><input type="text" id="prod-nombre" required></div>
      <div class="form-group"><label>Categoría</label><input type="text" id="prod-categoria" required></div>
      <div class="form-group"><label>Precio (ej: $24.900)</label><input type="text" id="prod-precio" required></div>
      <div class="form-group"><label>💰 Precio anterior (opcional — tachado)</label><input type="text" id="prod-precioAnterior" placeholder="ej: $34.900" style="border-color:#ff666644;"></div>
      <div class="form-group"><label>Descripción corta</label><textarea id="prod-descripcion" rows="3" required></textarea></div>
      <div class="form-group">
        <label>Imágenes del producto</label>
        <div class="upload-zone" id="upload-zone">
          <span class="upload-icon">📸</span>
          <span>Hacé clic o arrastrá imágenes acá</span>
          <span class="upload-hint">Podés seleccionar varias a la vez</span>
          <input type="file" id="prod-imagenes" accept="image/*" multiple>
        </div>
      </div>
      <div class="form-group" id="preview-imagenes" style="display:flex; gap:8px; flex-wrap:wrap;"></div>
      <div class="form-group" id="preview-nuevas" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:4px;"></div>
      <div class="form-group"><label>Badge (new / hot / sale / vacío)</label><input type="text" id="prod-badge" placeholder="new, hot, sale"></div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" id="modal-cancel">Cancelar</button>
        <button type="submit" id="modal-save">Guardar producto</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-admin" class="toast-admin"><span class="toast-dot"></span><span id="toast-msg-admin"></span></div>

<script>
// --- Toast ---
function showToast(msg, isError = false) {
  const toast = document.getElementById('toast-admin');
  const span = document.getElementById('toast-msg-admin');
  span.textContent = msg;
  toast.style.borderColor = isError ? '#ff3366' : '#66ffcc';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// --- Variables globales ---
let token = null;
let productos = [];
let editandoId = null; // null = crear nuevo, número = editar
let imagenesExistentes = []; // urls de imágenes existentes al editar
let imagenesARemover = []; // urls de imágenes existentes marcadas para eliminar

// --- Modal control ---
function renderPreviewImagenes() {
  const container = document.getElementById('preview-imagenes');
  const nuevasContainer = document.getElementById('preview-nuevas');

  // Mostrar imágenes existentes (no removidas) con botón de eliminar
  container.innerHTML = imagenesExistentes
    .filter(url => !imagenesARemover.includes(url))
    .map((url, i) => `
      <div class="img-item">
        <img src="${url}">
        <button class="img-remove" data-url="${url}" onclick="marcarRemover(this)" title="Eliminar">✕</button>
      </div>
    `).join('') || '<span style="color:#666;font-size:13px;">Sin imágenes guardadas</span>';

  // Mostrar nuevas imágenes seleccionadas (desde el input file)
  const fileInput = document.getElementById('prod-imagenes');
  nuevasContainer.innerHTML = Array.from(fileInput.files).map((file, i) => {
    const url = URL.createObjectURL(file);
    return `
      <div class="img-item">
        <img src="${url}">
        <button class="img-remove" onclick="quitarNuevaImagen(${i})" title="Quitar">✕</button>
      </div>
    `;
  }).join('');
}

function marcarRemover(btn) {
  const url = btn.dataset.url;
  if (url && !imagenesARemover.includes(url)) {
    imagenesARemover.push(url);
  }
  renderPreviewImagenes();
}

function quitarNuevaImagen(index) {
  const dt = new DataTransfer();
  const files = document.getElementById('prod-imagenes').files;
  for (let i = 0; i < files.length; i++) {
    if (i !== index) dt.items.add(files[i]);
  }
  document.getElementById('prod-imagenes').files = dt.files;
  renderPreviewImagenes();
}

function openModal(producto = null) {
  const modal = document.getElementById('productModal');
  const fileInput = document.getElementById('prod-imagenes');
  fileInput.value = '';
  imagenesARemover = [];

  if (producto) {
    editandoId = producto.id;
    document.getElementById('prod-nombre').value = producto.nombre || '';
    document.getElementById('prod-categoria').value = producto.categoria || '';
    document.getElementById('prod-precio').value = producto.precio || '';
    document.getElementById('prod-precioAnterior').value = producto.precioAnterior || '';
    document.getElementById('prod-descripcion').value = producto.descripcion || '';
    document.getElementById('prod-badge').value = producto.badge || '';
    imagenesExistentes = producto.imagenes && producto.imagenes.length
      ? [...producto.imagenes]
      : (producto.imagen ? [producto.imagen] : []);
  } else {
    editandoId = null;
    document.getElementById('prod-nombre').value = '';
    document.getElementById('prod-categoria').value = '';
    document.getElementById('prod-precio').value = '';
    document.getElementById('prod-precioAnterior').value = '';
    document.getElementById('prod-descripcion').value = '';
    document.getElementById('prod-badge').value = '';
    imagenesExistentes = [];
  }
  renderPreviewImagenes();
  modal.classList.add('active');
}

// Preview al seleccionar archivos
document.getElementById('prod-imagenes').addEventListener('change', function() {
  renderPreviewImagenes();
});

// Drag & drop visual feedback
const uploadZone = document.getElementById('upload-zone');
uploadZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadZone.classList.add('drag-over');
});
uploadZone.addEventListener('dragleave', () => {
  uploadZone.classList.remove('drag-over');
});
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const files = e.dataTransfer.files;
  if (files.length) {
    const input = document.getElementById('prod-imagenes');
    // Combinar archivos existentes con los nuevos
    const dt = new DataTransfer();
    for (const f of input.files) dt.items.add(f);
    for (const f of files) {
      if (f.type.startsWith('image/')) dt.items.add(f);
    }
    input.files = dt.files;
    renderPreviewImagenes();
  }
});

function closeModal() {
  document.getElementById('productModal').classList.remove('active');
  editandoId = null;
}

// Envío del formulario (crear o editar)
document.getElementById('productForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const nombre = document.getElementById('prod-nombre').value.trim();
  const categoria = document.getElementById('prod-categoria').value.trim();
  const precio = document.getElementById('prod-precio').value.trim();
  const precioAnterior = document.getElementById('prod-precioAnterior').value.trim() || null;
  const descripcion = document.getElementById('prod-descripcion').value.trim();
  const badge = document.getElementById('prod-badge').value.trim();
  const fileInput = document.getElementById('prod-imagenes');

  if (!nombre || !categoria || !precio || !descripcion) {
    showToast('Completá todos los campos obligatorios', true);
    return;
  }

  const formData = new FormData();
  formData.append('nombre', nombre);
  formData.append('categoria', categoria);
  formData.append('precio', precio);
  if (precioAnterior) formData.append('precioAnterior', precioAnterior);
  formData.append('descripcion', descripcion);
  if (badge) formData.append('badge', badge);
  for (const file of fileInput.files) {
    formData.append('imagenes', file);
  }
  // Enviar qué imágenes existentes conservar y cuáles eliminar
  if (editandoId) {
    const conservar = imagenesExistentes.filter(url => !imagenesARemover.includes(url));
    formData.append('imagenesConservar', JSON.stringify(conservar));
    if (imagenesARemover.length) {
      formData.append('imagenesARemover', JSON.stringify(imagenesARemover));
    }
  }

  try {
    let url = '/api/products';
    let method = 'POST';
    if (editandoId) {
      url = `/api/products/${editandoId}`;
      method = 'PUT';
    }
    const res = await fetch(url, {
      method: method,
      headers: { 'Authorization': token },
      body: formData
    });
    if (res.ok) {
      showToast(editandoId ? '✅ Producto actualizado' : '✅ Producto creado');
      closeModal();
      await cargarProductos();
    } else {
      showToast('❌ Error al guardar', true);
    }
  } catch (err) {
    showToast('Error de red', true);
  }
});

document.getElementById('modal-cancel').addEventListener('click', closeModal);
// Cerrar modal si se clickea fuera del contenido
document.getElementById('productModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('productModal')) closeModal();
});

// --- Password toggle (ojo) ---
document.querySelectorAll('.pw-toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    const input = btn.parentElement.querySelector('input');
    if (!input) return;
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    btn.textContent = isPassword ? '🙈' : '👁️';
  });
});

// --- Forgot password (estilo Google) ---
document.getElementById('forgot-link').addEventListener('click', async () => {
  const box = document.getElementById('recovery-box');
  const questionEl = document.getElementById('recovery-question');
  const answerInput = document.getElementById('recovery-answer');

  document.getElementById('recovery-step1').style.display = 'block';
  document.getElementById('recovery-step2').style.display = 'none';
  document.getElementById('recovery-error').textContent = '';
  answerInput.value = '';

  if (box.classList.contains('show')) {
    box.classList.remove('show');
    return;
  }

  try {
    const res = await fetch('/api/recovery-question');
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (data.question) {
      questionEl.textContent = data.question;
      box.classList.add('show');
    } else {
      questionEl.textContent = '⚠️ No hay pregunta de seguridad configurada.';
      box.classList.add('show');
      document.getElementById('recovery-btn').style.display = 'none';
      answerInput.style.display = 'none';
    }
  } catch (err) {
    questionEl.textContent = '⚠️ Error al conectar con el servidor';
    box.classList.add('show');
  }
});

document.getElementById('recovery-btn').addEventListener('click', async () => {
  const answer = document.getElementById('recovery-answer').value.trim().toLowerCase();
  const errorEl = document.getElementById('recovery-error');
  if (!answer) {
    errorEl.textContent = '❌ Escribí tu respuesta';
    return;
  }
  try {
    const res = await fetch('/api/recover-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answer })
    });
    const data = await res.json();
    if (res.ok && data.verified) {
      document.getElementById('recovery-step1').style.display = 'none';
      document.getElementById('recovery-step2').style.display = 'block';
      document.getElementById('recovery-result').textContent = '';
    } else {
      errorEl.textContent = '❌ Respuesta incorrecta';
    }
  } catch (err) {
    document.getElementById('recovery-error').textContent = '⚠️ Error de conexión';
  }
});

document.getElementById('recovery-save-btn').addEventListener('click', async () => {
  const newAccess = document.getElementById('recovery-new-access').value.trim();
  const newAdmin = document.getElementById('recovery-new-admin').value.trim();
  const resultEl = document.getElementById('recovery-result');
  if (!newAccess || !newAdmin) {
    resultEl.textContent = '❌ Completá ambas contraseñas';
    resultEl.style.color = '#ff3366';
    return;
  }
  try {
    const answer = document.getElementById('recovery-answer').value.trim().toLowerCase();
    const res = await fetch('/api/reset-passwords', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answer, newAccessPassword: newAccess, newAdminPassword: newAdmin })
    });
    if (res.ok) {
      resultEl.innerHTML = '✅ Contraseñas actualizadas. Ahora iniciá sesión con las nuevas.';
      resultEl.style.color = '#66ffcc';
      document.getElementById('access-password').value = newAccess;
      document.getElementById('admin-password').value = newAdmin;
      setTimeout(() => {
        document.getElementById('recovery-box').classList.remove('show');
      }, 2000);
    } else {
      const data = await res.json();
      resultEl.textContent = data.error || '❌ Error al guardar';
      resultEl.style.color = '#ff3366';
    }
  } catch (err) {
    resultEl.textContent = '⚠️ Error de conexión';
    resultEl.style.color = '#ff3366';
  }
});

// --- Login ---
async function login() {
  const accessPw = document.getElementById('access-password').value;
  const adminPw = document.getElementById('admin-password').value;
  if (!accessPw || !adminPw) {
    document.getElementById('login-error').textContent = '❌ Completá ambos campos';
    return;
  }
  try {
    const res = await fetch('/api/verify-admin-access', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ accessPassword: accessPw, adminPassword: adminPw })
    });
    if (res.ok) {
      const data = await res.json();
      token = data.token;
      document.getElementById('login-box').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      await cargarProductos();
      await cargarConfig();
    } else {
      document.getElementById('login-error').textContent = '❌ Contraseña incorrecta';
    }
  } catch (err) {
    document.getElementById('login-error').textContent = '⚠️ No se pudo conectar al servidor. ¿Está corriendo "node server.js"?';
  }
}

// --- Productos ---
async function cargarProductos() {
  const loadingDiv = document.getElementById('productos-loading');
  const gridDiv = document.getElementById('productos-list');
  loadingDiv.style.display = 'block';
  gridDiv.style.display = 'none';
  try {
    const res = await fetch('/api/products');
    if (!res.ok) throw new Error('Error HTTP');
    productos = await res.json();
    renderProductos();
    loadingDiv.style.display = 'none';
    gridDiv.style.display = 'grid';
  } catch (err) {
    loadingDiv.innerHTML = '❌ Error al cargar productos. Verifica que el servidor esté corriendo.';
    showToast('Error al cargar productos', true);
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function renderProductos() {
  const container = document.getElementById('productos-list');
  if (!productos.length) {
    container.innerHTML = '<p style="text-align:center; grid-column:1/-1;">📭 No hay productos aún. Creá uno nuevo.</p>';
    return;
  }
  container.innerHTML = productos.map((p, idx) => {
    const imgs = p.imagenes && p.imagenes.length ? p.imagenes : (p.imagen ? [p.imagen] : []);
    const idSafe = (p.id || '').toString().replace(/[^a-zA-Z0-9]/g, '');
    const idxGlobal = idx;
    return `
    <div class="producto-card">
      <div class="card-gallery">
        ${imgs.length ? `
          <div style="position:relative;">
            <img class="card-main-img" id="mainimg-${idSafe}" src="${imgs[0]}" onerror="this.style.display='none'" data-idx="${idxGlobal}">
            ${imgs.length > 1 ? `<span class="card-img-count">${imgs.length} fotos</span>` : ''}
          </div>
        ` : `<div style="width:100%;height:150px;background:#0a0a10;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#666;">Sin imagen</div>`}
        ${imgs.length > 1 ? `
        <div class="card-thumbs">${imgs.map((url, i) =>
          `<img src="${url}" onerror="this.style.display='none'" onclick="cambiarMainImg(${idxGlobal}, ${i})" class="${i === 0 ? 'active' : ''}">`
        ).join('')}</div>
        ` : ''}
      </div>
      <h3 style="margin-top:8px;">${escapeHtml(p.nombre)}</h3>
      <p><strong style="font-size:1.1rem;">${p.precio}</strong> ${p.precioAnterior ? `<span class="precio-anterior">${p.precioAnterior}</span>` : ''}</p>
      <p>Categoría: ${escapeHtml(p.categoria)}</p>
      <p>Badge: ${p.badge ? (p.badge === 'new' ? '🆕 Nuevo' : p.badge === 'hot' ? '🔥 Hot' : p.badge === 'sale' ? '💰 Oferta' : p.badge) : 'ninguno'}</p>
      <div style="margin-top:0.8rem; display:flex; gap:0.5rem;">
        <button onclick="editarProducto('${p.id}')">✏️ Editar</button>
        <button onclick="eliminarProducto('${p.id}')" style="background:#333;">🗑️ Eliminar</button>
      </div>
    </div>`;
  }).join('');
}

// Mini-galería en tarjetas del admin
function cambiarMainImg(idx, index) {
  const prod = productos[idx];
  if (!prod) return;
  const imgs = prod.imagenes && prod.imagenes.length ? prod.imagenes : (prod.imagen ? [prod.imagen] : []);
  const idSafe = (prod.id || '').toString().replace(/[^a-zA-Z0-9]/g, '');
  const mainImg = document.getElementById(`mainimg-${idSafe}`);
  if (!mainImg || !imgs[index]) return;
  mainImg.src = imgs[index];
  mainImg.style.display = '';
  const parent = mainImg.closest('.card-gallery');
  if (!parent) return;
  parent.querySelectorAll('.card-thumbs img').forEach((img, i) => {
    img.classList.toggle('active', i === index);
  });
}

async function eliminarProducto(id) {
  if (!confirm('¿Eliminar este producto permanentemente?')) return;
  try {
    const res = await fetch(`/api/products/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': token }
    });
    if (res.ok) {
      showToast('✅ Producto eliminado');
      await cargarProductos();
    } else {
      showToast('❌ Error al eliminar', true);
    }
  } catch (err) {
    showToast('Error de red', true);
  }
}

function editarProducto(id) {
  const prod = productos.find(p => p.id === id);
  if (prod) openModal(prod);
}

// Nuevo producto: abrir modal vacío
document.getElementById('btn-nuevo-producto').addEventListener('click', () => {
  openModal();
});

// --- Configuración ---
async function cargarConfig() {
  try {
    const res = await fetch('/api/admin/config', { headers: { 'Authorization': token } });
    if (!res.ok) throw new Error();
    const cfg = await res.json();
    document.getElementById('config-whatsapp').value = cfg.whatsappNumber || '';
    document.getElementById('config-lv').value = cfg.horarios?.lunesViernes || '';
    document.getElementById('config-sab').value = cfg.horarios?.sabados || '';
    document.getElementById('config-dom').value = cfg.horarios?.domingos || '';
    document.getElementById('config-fer').value = cfg.horarios?.feriados || '';
    document.getElementById('config-ticker').value = (cfg.tickerItems || []).join(', ');
    document.getElementById('config-recovery-question').value = cfg.recoveryQuestion || '';
    document.getElementById('config-recovery-answer').value = cfg.recoveryAnswer || '';
  } catch (err) {
    showToast('Error al cargar configuración', true);
  }
}

document.getElementById('guardar-config').addEventListener('click', async () => {
  const newConfig = {
    whatsappNumber: document.getElementById('config-whatsapp').value,
    horarios: {
      lunesViernes: document.getElementById('config-lv').value,
      sabados: document.getElementById('config-sab').value,
      domingos: document.getElementById('config-dom').value,
      feriados: document.getElementById('config-fer').value
    },
    tickerItems: document.getElementById('config-ticker').value.split(',').map(s => s.trim()).filter(s => s),
    recoveryQuestion: document.getElementById('config-recovery-question').value.trim(),
    recoveryAnswer: document.getElementById('config-recovery-answer').value.trim()
  };
  const newAccessPw = document.getElementById('new-access-password').value;
  if (newAccessPw) newConfig.pageAccessPassword = newAccessPw;
  const newPassword = document.getElementById('new-password').value;
  if (newPassword) newConfig.adminPassword = newPassword;

  try {
    const res = await fetch('/api/admin/config', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': token },
      body: JSON.stringify(newConfig)
    });
    if (res.ok) {
      const msgDiv = document.getElementById('config-msg');
      msgDiv.className = 'success';
      msgDiv.textContent = '✅ Configuración guardada correctamente';
      setTimeout(() => msgDiv.textContent = '', 3000);
      showToast('Configuración actualizada');
      if (newAccessPw || newPassword) {
        alert('Contraseña(s) cambiada(s). Reiniciá sesión.');
        location.reload();
      }
    } else throw new Error();
  } catch (err) {
    document.getElementById('config-msg').className = 'error';
    document.getElementById('config-msg').textContent = '❌ Error al guardar';
    showToast('Error al guardar', true);
  }
});

// --- Tabs ---
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
  });
});

document.getElementById('login-btn').addEventListener('click', login);
