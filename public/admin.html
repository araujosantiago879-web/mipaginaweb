<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin · El Lado B</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="image_src" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&family=Archivo:wght@400;500;600;700;900&family=Inconsolata:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #050508;
      --ink-2: #0a0a10;
      --ink-3: #111118;
      --ink-4: #1a1a24;
      --edge: rgba(255,255,255,0.06);
      --paper: #eef2f5;
      --paper-2: #d8e0e8;
      --rose: #ff3366;
      --rose-d: #cc2952;
      --amber: #ffaa33;
      --lime: #66ffcc;
      --muted: rgba(200,215,230,0.55);
      --muted-2: rgba(200,215,230,0.22);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { background:var(--ink); color:var(--paper); font-family:'Archivo',sans-serif; overflow-x:hidden; padding:2rem; }
    a { color:inherit; text-decoration:none; }
    button { font-family:inherit; border:none; background:none; cursor:pointer; }
    .container { max-width:1400px; margin:0 auto; }

    /* HEADER */
    .admin-header {
      display:flex; justify-content:space-between; align-items:center;
      flex-wrap:wrap; gap:1rem; margin-bottom:2rem;
    }
    .admin-header h1 { font-family:'Cormorant Garamond',serif; font-size:3rem; font-weight:700; line-height:.9; }
    .admin-header h1 em { color:var(--rose); font-style:italic; }
    .admin-header small { display:block; font-family:'Inconsolata',monospace; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-top:4px; }

    /* TABS */
    .tabs-bar { display:flex; gap:0; margin-bottom:2rem; overflow-x:auto; scrollbar-width:none; }
    .tabs-bar::-webkit-scrollbar { display:none; }
    .tab-btn {
      font-family:'Inconsolata',monospace; font-size:11px; letter-spacing:2px; text-transform:uppercase;
      color:var(--muted); padding:13px 24px; border-bottom:2px solid transparent;
      white-space:nowrap; transition:all .25s;
    }
    .tab-btn.active { color:var(--paper); border-bottom-color:var(--rose); }
    .tab-btn:hover { color:var(--paper); }

    .tab-content { display:none; animation:fadein .3s ease; }
    .tab-content.active { display:block; }
    @keyframes fadein { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

    /* SECTION TITLE */
    .section-title {
      font-family:'Cormorant Garamond',serif; font-size:clamp(28px,3vw,42px); font-weight:700; line-height:.9;
      margin-bottom:1.5rem;
    }
    .section-title em { color:var(--rose); font-style:italic; }

    /* LOGIN */
    .login-box { max-width:400px; margin:12vh auto; }
    .login-card {
      background:var(--ink-2); border:1px solid var(--edge);
      padding:2.5rem 2rem; display:flex; flex-direction:column; gap:1.5rem;
    }
    .login-card h2 { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:700; text-align:center; }
    .login-card h2 em { color:var(--rose); font-style:italic; }
    .login-card p.sub { text-align:center; font-family:'Inconsolata',monospace; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-top:-1rem; }
    .login-error { color:var(--rose); font-size:0.85rem; text-align:center; min-height:1.2em; }

    /* FORM ELEMENTS */
    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; font-family:'Inconsolata',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:0.5rem; }

    .toggle-label { display:flex !important; align-items:center; gap:6px; font-size:10px !important; cursor:pointer; white-space:nowrap; }
    .toggle-label input { width:16px; height:16px; cursor:pointer; }
    .form-input {
      width:100%; padding:12px 16px;
      background:var(--ink-3); border:1px solid var(--edge);
      color:var(--paper); font-family:'Inconsolata',monospace; font-size:13px;
      outline:none; transition:border-color .25s;
    }
    .form-input:focus { border-color:var(--rose); }
    textarea.form-input { resize:vertical; min-height:80px; }

    /* BUTTONS */
    .btn { display:inline-flex; align-items:center; gap:10px; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:14px 24px; transition:all .25s; }
    .btn-primary { background:var(--rose); color:#fff; }
    .btn-primary:hover { background:var(--rose-d); }
    .btn-ghost { border:1px solid var(--edge); color:var(--muted); }
    .btn-ghost:hover { border-color:rgba(238,242,245,.3); color:var(--paper); }
    .btn-danger { background:var(--ink-4); color:var(--muted); border:1px solid var(--edge); }
    .btn-danger:hover { background:rgba(255,51,102,.15); border-color:var(--rose); color:var(--rose); }
    .btn-block { width:100%; justify-content:center; }
    .btn-sm { padding:10px 16px; font-size:10px; }

    /* PW FIELD */
    .pw-field { position:relative; display:flex; align-items:center; }
    .pw-field .form-input { padding-right:50px; }
    .pw-wall {
      position:absolute; right:0; top:0; bottom:0; width:40px;
      background:var(--rose); cursor:pointer;
      transition:0.2s; display:flex; align-items:center; justify-content:center;
    }
    .pw-wall:hover { background:var(--rose-d); }
    .pw-wall.showing { background:var(--ink-4); border-left:2px solid var(--rose); }
    .pw-wall.showing:hover { background:var(--ink-3); }
    .pw-wall-icon { font-size:16px; color:#fff; line-height:1; pointer-events:none; }
    .pw-wall.showing .pw-wall-icon { color:var(--rose); }

    /* PRODUCTS GRID */
    .products-grid {
      display:flex;
      flex-direction:column;
      gap:2rem;
      margin-top:1.5rem;
    }
    .cat-group { display:flex; flex-direction:column; gap:2px; }
    .cat-header {
      font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:700; color:var(--rose);
      padding:8px 0 4px; border-bottom:1px solid var(--edge); margin-bottom:2px;
      display:flex; align-items:center; gap:8px;
    }
    .cat-count { font-family:'Inconsolata',monospace; font-size:10px; color:var(--muted); background:var(--ink-3); padding:1px 8px; border-radius:99px; }
    .cat-items { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:2px; }
    .producto-card {
      background:var(--ink-2);
      border:1px solid var(--edge);
      display:flex; flex-direction:column;
      transition:transform .3s, box-shadow .3s;
      position:relative; overflow:hidden;
    }
    .producto-card:hover {
      transform:translateY(-4px);
      box-shadow:0 16px 32px rgba(0,0,0,.5);
      border-color:var(--edge);
      z-index:2;
    }
    .card-gallery { position:relative; }
    .card-main-img { width:100%; height:180px; object-fit:cover; display:block; background:var(--ink-3); }
    .card-thumbs { display:flex; gap:2px; margin-top:2px; overflow-x:auto; }
    .card-thumbs img {
      width:48px; height:48px; object-fit:cover; cursor:pointer;
      border:1px solid var(--edge); flex-shrink:0; transition:border-color .2s;
    }
    .card-thumbs img:hover { border-color:var(--rose); }
    .card-thumbs img.active { border-color:var(--rose); }
    .card-img-count {
      position:absolute; bottom:6px; right:6px;
      background:rgba(5,5,8,.8); backdrop-filter:blur(4px);
      color:var(--paper); font-family:'Inconsolata',monospace; font-size:10px;
      padding:2px 8px; border:1px solid var(--edge);
    }
    .producto-body { padding:16px; flex:1; display:flex; flex-direction:column; gap:6px; }
    .producto-body h3 { font-size:14px; font-weight:700; }
    .producto-body .cat { font-family:'Inconsolata',monospace; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--rose); }
    .producto-body .price { font-family:'Inconsolata',monospace; font-size:16px; color:var(--lime); margin-top:auto; padding-top:12px; display:flex; align-items:center; gap:8px; }
    .producto-body .price .old { font-size:12px; color:#ff6666; text-decoration:line-through; }
    .producto-body .badge { font-family:'Inconsolata',monospace; font-size:9px; letter-spacing:2px; text-transform:uppercase; padding:3px 8px; display:inline-block; width:fit-content; }
    .badge-new { background:var(--rose); color:#fff; }
    .badge-hot { background:var(--amber); color:var(--ink); }
    .badge-sale { background:var(--lime); color:var(--ink); }
    .producto-actions { display:flex; gap:2px; margin-top:auto; }
    .producto-actions .btn { flex:1; justify-content:center; border-radius:0; }

    /* TOOLBAR */
    .toolbar { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; margin-bottom:1rem; }
    .toolbar-left { display:flex; gap:.75rem; align-items:center; flex-wrap:wrap; }
    .hamburger-btn { display:flex; flex-direction:column; gap:4px; background:none; border:none; cursor:pointer; padding:6px; }
    .hamburger-btn span { width:20px; height:2px; background:var(--paper); border-radius:2px; transition:all .25s; }
    .hamburger-btn.active span:nth-child(1) { transform:rotate(45deg) translate(4px,4px); }
    .hamburger-btn.active span:nth-child(2) { opacity:0; }
    .hamburger-btn.active span:nth-child(3) { transform:rotate(-45deg) translate(4px,-4px); }
    .drawer-bg { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:600; opacity:0; pointer-events:none; transition:opacity .3s; }
    .drawer-bg.open { opacity:1; pointer-events:auto; }
    .drawer { position:fixed; top:0; right:0; width:360px; max-width:90vw; height:100vh; background:linear-gradient(170deg, #0a0a10 0%, #0c070a 50%, #0a0a10 100%); z-index:700; transform:translateX(100%); transition:transform .3s ease; display:flex; flex-direction:column; overflow-y:auto; }
    .drawer::after { content:''; position:absolute; top:-20%; right:-30%; width:200px; height:200px; border-radius:50%; background:rgba(255,51,102,.015); pointer-events:none; }
    @supports(height:-webkit-fill-available) { .drawer { height:-webkit-fill-available; } }
    @supports(height:-moz-available) { .drawer { height:-moz-available; } }
    .drawer.open { transform:translateX(0); }
    .drawer-header { display:flex; align-items:center; justify-content:space-between; padding:20px 24px; flex-shrink:0; }
    .drawer-title { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:700; }
    .drawer-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:4px; }
    .drawer-close:hover { color:var(--paper); }
    .drawer-search { padding:16px 24px; }
    .drawer-input { width:100%; padding:10px 14px; background:var(--ink-3); border:1px solid var(--edge); color:var(--paper); font-family:'Inconsolata',monospace; font-size:13px; border-radius:1px; }
    .drawer-input:focus { outline:none; border-color:var(--rose); }
    .drawer-list { flex:1; padding:12px 0; }
    .drawer-item { display:flex; align-items:center; gap:14px; padding:12px 24px; cursor:pointer; transition:background .15s; }
    .drawer-item:hover { background:var(--ink-3); }
    .drawer-item-img { width:44px; height:44px; object-fit:cover; border-radius:4px; background:var(--ink-4); flex-shrink:0; }
    .drawer-item-info { flex:1; min-width:0; }
    .drawer-item-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .drawer-item-price { font-family:'Inconsolata',monospace; font-size:12px; color:var(--lime); }
    .drawer-item-cat { font-family:'Inconsolata',monospace; font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
    .drawer-empty { padding:40px 24px; text-align:center; color:var(--muted); font-size:13px; }
    .drawer-tabs { display:flex; gap:4px; }
    .drawer-tab { font-family:'Inconsolata',monospace; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; padding:6px 14px; border:1px solid var(--edge); background:transparent; color:var(--muted); cursor:pointer; transition:all .2s; border-radius:2px; }
    .drawer-tab.on { border-color:var(--rose); color:var(--rose); background:rgba(255,51,102,.06); }
    .drawer-categories { flex:1; padding:8px 0; overflow-y:auto; }
    .drawer-cat-group { border-bottom:1px solid var(--edge); }
    .drawer-cat-header { display:flex; align-items:center; gap:8px; padding:12px 24px; cursor:pointer; font-family:'Inconsolata',monospace; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--rose); font-weight:700; transition:background .15s; user-select:none; }
    .drawer-cat-header:hover { background:var(--ink-3); }
    .drawer-cat-header::before { content:''; width:6px; height:6px; border-right:2px solid var(--muted-2); border-bottom:2px solid var(--muted-2); transform:rotate(-45deg); transition:transform .3s; flex-shrink:0; }
    .drawer-cat-group.open .drawer-cat-header::before { transform:rotate(45deg); }
    .drawer-cat-subs { overflow:hidden; max-height:0; transition:max-height .35s ease; }
    .drawer-cat-group.open .drawer-cat-subs { max-height:600px; }
    .drawer-cat-sub { display:block; width:100%; padding:10px 24px 10px 40px; font-family:'Archivo',sans-serif; font-size:14px; color:var(--muted); cursor:pointer; transition:color .2s, background .15s; background:none; border:none; text-align:left; }
    .drawer-cat-sub:hover { color:var(--paper); background:rgba(255,255,255,.02); }
    .drawer-products { flex:1; display:flex; flex-direction:column; overflow:hidden; }

    /* CONFIG SECTION */
    .config-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:2px;
    }
    .config-card {
      background:var(--ink-2); border:1px solid var(--edge);
      padding:2rem; display:flex; flex-direction:column; gap:1rem;
    }
    .config-card h3 { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:700; }
    .config-card h3 em { color:var(--rose); font-style:italic; }
    @media(max-width:768px){ .config-grid { grid-template-columns:1fr; } }
    .config-actions { margin-top:1rem; }

    /* MODAL */
    .modal-backdrop {
      position:fixed; inset:0; z-index:800;
      background:rgba(5,5,8,.93); backdrop-filter:blur(14px);
      display:none; align-items:center; justify-content:center; padding:20px;
    }
    .modal-backdrop.active { display:flex; }
    .modal {
      background:var(--ink-3); border:1px solid var(--edge);
      max-width:600px; width:100%; max-height:90vh; overflow-y:auto;
    }
    .modal-header {
      padding:1.5rem 2rem;
      display:flex; justify-content:space-between; align-items:center;
    }
    .modal-header h3 { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:700; }
    .modal-header h3 em { color:var(--rose); font-style:italic; }
    .modal-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:4px; }
    .modal-close:hover { color:var(--paper); }
    .modal-body { padding:2rem; }
    .modal-actions { display:flex; gap:10px; margin-top:1.5rem; justify-content:flex-end; }
    .modal-actions .btn { border-radius:0; }

    /* IMAGE ITEMS */
    .img-item { position:relative; width:80px; height:80px; overflow:hidden; border:1px solid var(--edge); flex-shrink:0; background:var(--ink-2); }
    .img-item img { width:100%; height:100%; object-fit:cover; }
    .img-item .img-remove {
      position:absolute; top:4px; right:4px; width:22px; height:22px;
      background:rgba(5,5,8,.8); border:1px solid var(--edge);
      color:var(--muted); font-size:12px; cursor:pointer; display:flex;
      align-items:center; justify-content:center; transition:0.2s; padding:0;
    }
    .img-item .img-remove:hover { background:var(--rose); border-color:var(--rose); color:#fff; }
    .img-item.removing { opacity:0.3; filter:grayscale(1); }
    .img-item.removing::after {
      content:'✕'; position:absolute; inset:0; display:flex; align-items:center;
      justify-content:center; font-size:2rem; color:var(--rose); background:rgba(5,5,8,.5);
    }

    /* LOADING */
    .loading { text-align:center; padding:3rem; color:var(--muted); font-family:'Inconsolata',monospace; }

    /* TOAST */
    .toast-admin {
      position:fixed; bottom:24px; right:24px; z-index:9000;
      background:var(--ink-3); border:1px solid var(--lime);
      padding:14px 20px; display:flex; align-items:center; gap:10px;
      font-size:12px; font-weight:600;
      transform:translateY(80px); opacity:0;
      transition:all .35s ease; pointer-events:none;
    }
    .toast-admin.show { transform:none; opacity:1; }
    .toast-dot { width:8px; height:8px; border-radius:50%; background:var(--lime); }
    .toast-admin.error { border-color:var(--rose); }
    .toast-admin.error .toast-dot { background:var(--rose); }

    /* PETALS */
    .petals {
      position:fixed; inset:0; z-index:-1;
      pointer-events:none; overflow:hidden;
    }
    .petals i {
      position:absolute; top:-50px;
      animation:petalFall linear infinite;
    }
    .petals i:nth-child(odd) {
      border-radius:70% 10% 50% 25% / 60% 15% 60% 20%;
      background:radial-gradient(ellipse at 30% 35%, #cc0011 0%, #800008 35%, #4d0005 70%, #260002 100%);
      box-shadow:inset 2px -2px 6px rgba(0,0,0,.5), inset -1px 1px 2px rgba(200,0,0,.1);
    }
    .petals i:nth-child(even) {
      border-radius:50% 20% 65% 15% / 55% 25% 50% 20%;
      background:radial-gradient(ellipse at 40% 30%, #b30015 0%, #660008 35%, #330004 70%, #1a0002 100%);
      box-shadow:inset -2px 3px 6px rgba(0,0,0,.5), inset 2px -2px 2px rgba(200,0,0,.1);
    }
    .petals i:nth-child(1) { left:2%; width:28px; height:18px; animation-duration:16s; animation-delay:-0s; opacity:.3; }
    .petals i:nth-child(2) { left:6%; width:20px; height:12px; animation-duration:20s; animation-delay:-4s; opacity:.25; }
    .petals i:nth-child(3) { left:10%; width:32px; height:20px; animation-duration:18s; animation-delay:-8s; opacity:.28; }
    .petals i:nth-child(4) { left:14%; width:18px; height:11px; animation-duration:22s; animation-delay:-2s; opacity:.3; }
    .petals i:nth-child(5) { left:18%; width:26px; height:16px; animation-duration:17s; animation-delay:-11s; opacity:.25; }
    .petals i:nth-child(6) { left:22%; width:22px; height:14px; animation-duration:21s; animation-delay:-6s; opacity:.32; }
    .petals i:nth-child(7) { left:26%; width:30px; height:18px; animation-duration:19s; animation-delay:-1s; opacity:.28; }
    .petals i:nth-child(8) { left:30%; width:20px; height:13px; animation-duration:23s; animation-delay:-9s; opacity:.26; }
    .petals i:nth-child(9) { left:34%; width:34px; height:22px; animation-duration:16s; animation-delay:-3s; opacity:.3; }
    .petals i:nth-child(10) { left:38%; width:24px; height:15px; animation-duration:20s; animation-delay:-7s; opacity:.28; }
    .petals i:nth-child(11) { left:42%; width:28px; height:17px; animation-duration:18s; animation-delay:-5s; opacity:.25; }
    .petals i:nth-child(12) { left:46%; width:20px; height:12px; animation-duration:24s; animation-delay:-12s; opacity:.32; }
    .petals i:nth-child(13) { left:50%; width:30px; height:18px; animation-duration:17s; animation-delay:-2s; opacity:.28; }
    .petals i:nth-child(14) { left:54%; width:22px; height:14px; animation-duration:21s; animation-delay:-10s; opacity:.26; }
    .petals i:nth-child(15) { left:58%; width:26px; height:16px; animation-duration:19s; animation-delay:-4s; opacity:.3; }
    .petals i:nth-child(16) { left:62%; width:32px; height:20px; animation-duration:23s; animation-delay:-1s; opacity:.25; }
    .petals i:nth-child(17) { left:66%; width:20px; height:13px; animation-duration:25s; animation-delay:-14s; opacity:.28; }
    .petals i:nth-child(18) { left:70%; width:28px; height:17px; animation-duration:14s; animation-delay:-8s; opacity:.3; }
    .petals i:nth-child(19) { left:74%; width:34px; height:22px; animation-duration:22s; animation-delay:-13s; opacity:.26; }
    .petals i:nth-child(20) { left:78%; width:22px; height:14px; animation-duration:19s; animation-delay:-15s; opacity:.32; }
    .petals i:nth-child(21) { left:82%; width:26px; height:16px; animation-duration:17s; animation-delay:-3s; opacity:.28; }
    .petals i:nth-child(22) { left:86%; width:30px; height:18px; animation-duration:21s; animation-delay:-9s; opacity:.25; }
    .petals i:nth-child(23) { left:90%; width:20px; height:12px; animation-duration:18s; animation-delay:-6s; opacity:.3; }
    .petals i:nth-child(24) { left:94%; width:28px; height:18px; animation-duration:24s; animation-delay:-11s; opacity:.28; }
    .petals i:nth-child(25) { left:4%; width:24px; height:15px; animation-duration:15s; animation-delay:-7s; opacity:.22; }
    .petals i:nth-child(26) { left:16%; width:30px; height:18px; animation-duration:26s; animation-delay:-16s; opacity:.24; }
    .petals i:nth-child(27) { left:28%; width:20px; height:13px; animation-duration:13s; animation-delay:-10s; opacity:.26; }
    .petals i:nth-child(28) { left:40%; width:32px; height:20px; animation-duration:22s; animation-delay:-18s; opacity:.22; }
    .petals i:nth-child(29) { left:52%; width:22px; height:14px; animation-duration:16s; animation-delay:-5s; opacity:.24; }

<script>
function showToast(msg, isError = false) {
  const toast = document.getElementById('toast-admin');
  const span = document.getElementById('toast-msg-admin');
  span.textContent = msg;
  toast.className = 'toast-admin' + (isError ? ' error' : '');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

let token = null;
let productos = [];
let editandoId = null;
let imagenesExistentes = [];
let imagenesARemover = [];
const CATEGORIAS = [
  'Vibradores', 'Para parejas', 'Punto G', 'Rabbits', 'Realísticos', 'Wand',
  'Beads', 'Cola de Zorra', 'Duchas Anales', 'Plugs Anales', 'Prostático', 'Vibradores Anales',
  'Arnéses', 'Prótesis', 'Fundas',
  'Bala Vibradora', 'Succión Clitoris', 'Huevos Vibradores', 'Vibradores Clitoris', 'Pump / Bomba Vaginal',
  'Vaginas', 'Anos', 'Bocas', 'Torsos', 'Texturados', 'Automáticos', 'Máquinas Sexuales', 'Muñecas y Muñecos', 'Chascos y Diversión',
  'Lencería', 'Disfraces', 'Slips', 'Tangas', 'Lencería Fina', 'Playboy', 'Vinilo',
  'Geles y lubricantes', 'Aceites y Esencias', 'Afrodisíaco', 'Preservativos',
  'Esposas / Antifaz', 'Látigos / Fustas', 'Inmovilizador', 'Metálicos', 'Pezón', 'Cueros', 'Castidad / Mordazas', 'Kits Bondage', 'Scandal', '50 Sombras de Grey',
  'Higiene Hombre', 'Higiene Mujer',
  'Perfumes Hombre', 'Perfumes Mujer'
];
function populateCategorias() {
  const dl = document.getElementById('cat-sugerencias');
  dl.innerHTML = CATEGORIAS.map(c => `<option value="${c}">`).join('');
}
populateCategorias();

function togglePw(inputId, wall) {
  const input = document.getElementById(inputId);
  if (!input) return;
  const isPassword = input.type === 'password';
  input.type = isPassword ? 'text' : 'password';
  wall.classList.toggle('showing', !isPassword);
  wall.querySelector('.pw-wall-icon').textContent = isPassword ? '🙈' : '👁️';
}

async function login() {
  const password = document.getElementById('admin-password').value;
  if (!password) { document.getElementById('login-error').textContent = '❌ Escribí la contraseña'; return; }
  document.getElementById('login-btn').textContent = 'Ingresando…';
  document.getElementById('login-btn').disabled = true;
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    if (res.ok) {
      const data = await res.json();
      token = data.token;
      localStorage.setItem('adminToken', token);
      document.getElementById('login-box').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      cargarProductos();
      cargarConfig();
    } else {
      document.getElementById('login-error').textContent = '❌ Contraseña incorrecta';
    }
  } catch (err) {
    document.getElementById('login-error').textContent = '⚠️ Error de conexión';
  } finally {
    document.getElementById('login-btn').textContent = 'Ingresar';
    document.getElementById('login-btn').disabled = false;
  }
}

document.getElementById('login-btn').addEventListener('click', login);
document.getElementById('admin-password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

document.getElementById('btn-logout').addEventListener('click', () => {
  token = null;
  localStorage.removeItem('adminToken');
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('login-box').style.display = 'block';
  document.getElementById('admin-password').value = '';
  document.getElementById('login-error').textContent = '';
});

const storedToken = localStorage.getItem('adminToken');
if (storedToken) {
  token = storedToken;
  fetch('/api/admin/config', { headers: { 'Authorization': token } })
    .then(res => {
      if (!res.ok) throw new Error();
      document.getElementById('login-box').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      cargarProductos();
      cargarConfig();
    })
    .catch(() => { localStorage.removeItem('adminToken'); token = null; location.reload(); });
}

function renderPreviewImagenes() {
  const container = document.getElementById('preview-imagenes');
  if (!container) return;
  const urls = imagenesExistentes.filter(url => !imagenesARemover.includes(url));
  container.innerHTML = urls.length
    ? urls.map(url => `<div class="img-item"><img src="${url}"><button class="img-remove" data-url="${url}" onclick="marcarRemover(this)" title="Eliminar">✕</button></div>`).join('')
    : '<span style="color:var(--muted);font-size:12px;">Sin imágenes</span>';
}

function marcarRemover(btn) {
  const url = btn.dataset.url;
  if (url && !imagenesARemover.includes(url)) imagenesARemover.push(url);
  renderPreviewImagenes();
}

document.getElementById('btn-agregar-url').addEventListener('click', () => {
  const inp = document.getElementById('prod-imagen-url');
  const url = inp.value.trim();
  if (!url) return;
  if (!imagenesExistentes.includes(url)) {
    imagenesExistentes.push(url);
    renderPreviewImagenes();
  }
  inp.value = '';
});
document.getElementById('prod-imagen-url').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('btn-agregar-url').click(); }
});
function openModal(producto = null) {
  const modal = document.getElementById('productModal');
  imagenesARemover = [];
  if (producto) {
    editandoId = producto.id;
    document.getElementById('prod-nombre').value = producto.nombre || '';
    document.getElementById('prod-categoria').value = producto.categoria || '';
    document.getElementById('prod-precio').value = producto.precio || '';
    document.getElementById('prod-precioAnterior').value = producto.precioAnterior || '';
    document.getElementById('prod-descripcion').value = producto.descripcion || '';
    document.getElementById('prod-badge').value = producto.badge || '';
    imagenesExistentes = producto.imagenes && producto.imagenes.length ? [...producto.imagenes] : (producto.imagen ? [producto.imagen] : []);
  } else {
    editandoId = null;
    ['prod-nombre','prod-categoria','prod-precio','prod-precioAnterior','prod-descripcion','prod-badge'].forEach(id => document.getElementById(id).value = '');
    imagenesExistentes = [];
  }
  renderPreviewImagenes();
  modal.classList.add('active');
}

function closeModal() { document.getElementById('productModal').classList.remove('active'); editandoId = null; }
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
document.getElementById('productModal').addEventListener('click', e => { if (e.target === document.getElementById('productModal')) closeModal(); });

document.getElementById('productForm').addEventListener('submit', async e => {
  e.preventDefault();
  const nombre = document.getElementById('prod-nombre').value.trim();
  const categoria = document.getElementById('prod-categoria').value.trim();
  const precio = document.getElementById('prod-precio').value.trim();
  const precioAnterior = document.getElementById('prod-precioAnterior').value.trim() || null;
  const descripcion = document.getElementById('prod-descripcion').value.trim();
  const badge = document.getElementById('prod-badge').value;
  const fileInput = document.getElementById('prod-imagenes');
  if (!nombre || !categoria || !precio || !descripcion) { showToast('Completá todos los campos obligatorios', true); return; }
  const formData = new FormData();
  formData.append('nombre', nombre);
  formData.append('categoria', categoria);
  formData.append('precio', precio);
  if (precioAnterior) formData.append('precioAnterior', precioAnterior);
  formData.append('descripcion', descripcion);
  if (badge) formData.append('badge', badge);
  for (const file of fileInput.files) formData.append('imagenes', file);
  const conservar = imagenesExistentes.filter(url => !imagenesARemover.includes(url));
  if (conservar.length) formData.append('imagenesConservar', JSON.stringify(conservar));
  if (editandoId && imagenesARemover.length) formData.append('imagenesARemover', JSON.stringify(imagenesARemover));
  try {
    let url = '/api/products';
    let method = 'POST';
    if (editandoId) { url = `/api/products/${editandoId}`; method = 'PUT'; }
    const res = await fetch(url, { method, headers: { 'Authorization': token }, body: formData });
    if (res.ok) { showToast(editandoId ? '✅ Producto actualizado' : '✅ Producto creado'); closeModal(); cargarProductos(); }
    else showToast('❌ Error al guardar', true);
  } catch (err) { showToast('Error de red', true); }
});

async function cargarProductos() {
  const loadingDiv = document.getElementById('productos-loading');
  const gridDiv = document.getElementById('productos-list');
  loadingDiv.style.display = 'block';
  gridDiv.style.display = 'none';
  try {
    const res = await fetch('/api/products');
    if (!res.ok) throw new Error();
    productos = await res.json();
    const container = document.getElementById('productos-list');
    if (!productos.length) { container.innerHTML = '<p style="text-align:center;grid-column:1/-1;padding:3rem;color:var(--muted);">📭 No hay productos aún. Creá uno nuevo.</p>'; }
    else {
      // Agrupar por categoría
      const grupos = {};
      productos.forEach((p, globalIdx) => {
        const cat = p.categoria || 'Sin categoría';
        if (!grupos[cat]) grupos[cat] = [];
        grupos[cat].push({ ...p, _globalIdx: globalIdx });
      });
      const categoriasOrdenadas = Object.keys(grupos).sort((a, b) => a.localeCompare(b));
      container.innerHTML = categoriasOrdenadas.map(cat => {
        const items = grupos[cat].map(p => {
          const idx = p._globalIdx;
          const imgs = p.imagenes && p.imagenes.length ? p.imagenes : (p.imagen ? [p.imagen] : []);
          const idSafe = (p.id || '').toString().replace(/[^a-zA-Z0-9]/g, '');
          return `<div class="producto-card">
            <div class="card-gallery">
              ${imgs.length ? `<div style="position:relative;"><img class="card-main-img" id="mainimg-${idSafe}" src="${imgs[0]}" onerror="this.style.display='none'" data-idx="${idx}">${imgs.length > 1 ? `<span class="card-img-count">${imgs.length} fotos</span>` : ''}</div>${imgs.length > 1 ? `<div class="card-thumbs">${imgs.map((url,i) => `<img src="${url}" onerror="this.style.display='none'" onclick="cambiarMainImg(${idx},${i})" class="${i===0?'active':''}">`).join('')}</div>` : ''}` : '<div style="width:100%;height:180px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;">Sin imagen</div>'}
            </div>
            <div class="producto-body">
              <span class="cat">${p.categoria || ''}</span>
              <h3>${escapeHtml(p.nombre)}</h3>
              ${p.badge ? `<span class="badge badge-${p.badge}">${p.badge === 'new' ? '🆕 Nuevo' : p.badge === 'hot' ? '🔥 Más vendido' : '💰 Descuento'}</span>` : ''}
              <div class="price">${p.precio} ${p.precioAnterior ? `<span class="old">${p.precioAnterior}</span>` : ''}</div>
              <div class="producto-actions">
                <button class="btn btn-ghost btn-sm" onclick="editarProducto('${p.id}')">✏️ Editar</button>
                <button class="btn btn-danger btn-sm" onclick="eliminarProducto('${p.id}')">🗑️ Eliminar</button>
              </div>
            </div>
          </div>`;
        }).join('');
        return `<div class="cat-group"><div class="cat-header" data-cat="${cat.replace(/"/g,'&quot;')}">${cat} <span class="cat-count">${grupos[cat].length}</span></div><div class="cat-items">${items}</div></div>`;
      }).join('');
    }
    loadingDiv.style.display = 'none';
    gridDiv.style.display = 'grid';
  } catch (err) {
    loadingDiv.innerHTML = '❌ Error al cargar productos. Verificá que el servidor esté corriendo.';
    showToast('Error al cargar productos', true);
  }
}

function renderDrawerCategories() {
  const el = document.getElementById('drawerCategories');
  let tree = null;
  try {
    const saved = localStorage.getItem('categoryTree');
    if (saved) tree = JSON.parse(saved);
  } catch {}
  if (!tree) tree = DEFAULT_TREE.map(p => ({ ...p, subs: [...p.subs] }));
  el.innerHTML = tree.map(p => `<div class="drawer-cat-group">
    <div class="drawer-cat-header">${p.name}</div>
    <div class="drawer-cat-subs">${p.subs.map(s => `<button class="drawer-cat-sub" data-sub="${s.replace(/"/g,'&quot;')}">${s}</button>`).join('')}</div>
  </div>`).join('');
  el.querySelectorAll('.drawer-cat-header').forEach(h => {
    h.addEventListener('click', () => {
      const grp = h.parentElement;
      const wasOpen = grp.classList.contains('open');
      el.querySelectorAll('.drawer-cat-group.open').forEach(g => g.classList.remove('open'));
      if (!wasOpen) grp.classList.add('open');
    });
  });
  el.querySelectorAll('.drawer-cat-sub').forEach(btn => {
    btn.addEventListener('click', () => {
      const sub = btn.dataset.sub;
      const headers = document.querySelectorAll('#productos-list .cat-header');
      for (const h of headers) {
        if (h.dataset.cat === sub) {
          h.scrollIntoView({ behavior: 'smooth', block: 'start' });
          break;
        }
      }
      closeDrawer();
    });
  });
}
function renderDrawerProducts(items) {
  const list = document.getElementById('drawerList');
  if (!items.length) { list.innerHTML = '<div class="drawer-empty">No se encontraron productos</div>'; return; }
  list.innerHTML = items.map(p_ => {
    const p = p_;
    return `<div class="drawer-item" data-id="${p.id}">
      <img class="drawer-item-img" src="${(p.imagenes?.[0] || p.imagen || '')}" alt="${p.nombre}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2244%22 height=%2244%22><rect fill=%22%232a2a2f%22 width=%2244%22 height=%2244%22/></svg>'">
      <div class="drawer-item-info">
        <div class="drawer-item-name">${escapeHtml(p.nombre)}</div>
        <div class="drawer-item-price">${p.precio}</div>
        <div class="drawer-item-cat">${p.categoria || ''}</div>
      </div>
    </div>`;
  }).join('');
  list.querySelectorAll('.drawer-item').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      closeDrawer();
      editarProducto(id);
    });
  });
}
function switchDrawerView(view) {
  document.querySelectorAll('.drawer-tab').forEach(t => t.classList.toggle('on', t.dataset.drawerView === view));
  document.getElementById('drawerCategories').style.display = view === 'categories' ? '' : 'none';
  document.getElementById('drawerProducts').style.display = view === 'products' ? '' : 'none';
  if (view === 'categories') renderDrawerCategories();
  if (view === 'products') { renderDrawerProducts(productos); document.getElementById('drawerSearch').value = ''; }
}
document.querySelectorAll('.drawer-tab').forEach(tab => {
  tab.addEventListener('click', () => switchDrawerView(tab.dataset.drawerView));
});
function openDrawer(view) {
  document.getElementById('drawerBg').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  document.getElementById('hamburgerBtn').classList.add('active');
  document.body.style.overflow = 'hidden';
  switchDrawerView(view || 'categories');
}
function closeDrawer() {
  document.getElementById('drawerBg').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('hamburgerBtn').classList.remove('active');
  document.body.style.overflow = '';
}
document.getElementById('hamburgerBtn').addEventListener('click', () => {
  if (document.getElementById('drawer').classList.contains('open')) closeDrawer();
  else openDrawer('categories');
});
document.getElementById('drawerClose').addEventListener('click', closeDrawer);
document.getElementById('drawerBg').addEventListener('click', closeDrawer);
document.getElementById('drawerSearch').addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) { renderDrawerProducts(productos); return; }
  renderDrawerProducts(productos.filter(p =>
    (p.nombre || '').toLowerCase().includes(q) ||
    (p.descripcion || '').toLowerCase().includes(q) ||
    (p.categoria || '').toLowerCase().includes(q)
  ));
});
// Escape cierra el drawer
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('drawer').classList.contains('open')) closeDrawer();
});

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function cambiarMainImg(idx, index) {
  const prod = productos[idx];
  if (!prod) return;
  const imgs = prod.imagenes && prod.imagenes.length ? prod.imagenes : (prod.imagen ? [prod.imagen] : []);
  const idSafe = (prod.id || '').toString().replace(/[^a-zA-Z0-9]/g, '');
  const mainImg = document.getElementById(`mainimg-${idSafe}`);
  if (!mainImg || !imgs[index]) return;
  mainImg.src = imgs[index];
  mainImg.style.display = '';
  const parent = mainImg.closest('.card-gallery');
  if (!parent) return;
  parent.querySelectorAll('.card-thumbs img').forEach((img, i) => img.classList.toggle('active', i === index));
}

async function eliminarProducto(id) {
  if (!confirm('¿Eliminar este producto permanentemente?')) return;
  try {
    const res = await fetch(`/api/products/${id}`, { method: 'DELETE', headers: { 'Authorization': token } });
    if (res.ok) { showToast('✅ Producto eliminado'); cargarProductos(); }
    else showToast('❌ Error al eliminar', true);
  } catch (err) { showToast('Error de red', true); }
}

function editarProducto(id) { const prod = productos.find(p => String(p.id) === id); if (prod) openModal(prod); }
document.getElementById('btn-nuevo-producto').addEventListener('click', () => openModal());

async function cargarConfig() {
  try {
    const res = await fetch('/api/admin/config', { headers: { 'Authorization': token } });
    if (!res.ok) throw new Error();
    const cfg = await res.json();
    document.getElementById('config-whatsapp').value = cfg.whatsappNumber || '';
    document.getElementById('config-lv').value = cfg.horarios?.lunesViernes || '';
    document.getElementById('config-sab').value = cfg.horarios?.sabados || '';
    document.getElementById('config-dom').value = cfg.horarios?.domingos || '';
    document.getElementById('config-fer').value = cfg.horarios?.feriados || '';
    document.getElementById('config-ticker').value = (cfg.tickerItems || []).join(', ');
    document.getElementById('config-mp').value = cfg.mercadoPagoLink || '';
    document.getElementById('config-banco').value = cfg.banco || '';
    document.getElementById('config-cbu').value = cfg.cbu || '';
    document.getElementById('config-alias').value = cfg.alias || '';
    document.getElementById('config-titular').value = cfg.titular || '';
    document.getElementById('config-efectivo-habilitado').checked = cfg.efectivoHabilitado || false;
    document.getElementById('config-efectivo-texto').value = cfg.efectivoTexto || '';
    document.getElementById('config-otro-habilitado').checked = cfg.otroHabilitado || false;
    document.getElementById('config-otro-titulo').value = cfg.otroTitulo || '';
    document.getElementById('config-otro-texto').value = cfg.otroTexto || '';
  } catch (err) { showToast('Error al cargar configuración', true); }
}

document.getElementById('guardar-config').addEventListener('click', async () => {
  const newConfig = {
    whatsappNumber: document.getElementById('config-whatsapp').value,
    horarios: {
      lunesViernes: document.getElementById('config-lv').value,
      sabados: document.getElementById('config-sab').value,
      domingos: document.getElementById('config-dom').value,
      feriados: document.getElementById('config-fer').value
    },
    tickerItems: document.getElementById('config-ticker').value.split(',').map(s => s.trim()).filter(s => s),
    mercadoPagoLink: document.getElementById('config-mp').value,
    banco: document.getElementById('config-banco').value,
    cbu: document.getElementById('config-cbu').value,
    alias: document.getElementById('config-alias').value,
    titular: document.getElementById('config-titular').value,
    efectivoHabilitado: document.getElementById('config-efectivo-habilitado').checked,
    efectivoTexto: document.getElementById('config-efectivo-texto').value,
    otroHabilitado: document.getElementById('config-otro-habilitado').checked,
    otroTitulo: document.getElementById('config-otro-titulo').value,
    otroTexto: document.getElementById('config-otro-texto').value,
  };
  const newPassword = document.getElementById('new-password').value;
  if (newPassword) newConfig.adminPassword = newPassword;
  try {
    const res = await fetch('/api/admin/config', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': token },
      body: JSON.stringify(newConfig)
    });
    if (res.ok) {
      const msgDiv = document.getElementById('config-msg');
      msgDiv.className = 'msg msg-success';
      msgDiv.textContent = '✅ Configuración guardada';
      setTimeout(() => msgDiv.textContent = '', 3000);
      showToast('Configuración actualizada');
      if (newPassword) { alert('Contraseña cambiada. Reiniciá sesión.'); location.reload(); }
    } else throw new Error();
  } catch (err) {
    document.getElementById('config-msg').className = 'msg msg-error';
    document.getElementById('config-msg').textContent = '❌ Error al guardar';
    showToast('Error al guardar', true);
  }
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
    if (btn.dataset.tab === 'pedidos') cargarPedidos();
  });
});

// ─── Pedidos ─────────────────────────────────────────────────────────────────
async function cargarPedidos() {
  const loadingDiv = document.getElementById('pedidos-loading');
  const tableDiv = document.getElementById('pedidos-list');
  const tbody = document.getElementById('pedidos-body');
  loadingDiv.style.display = 'block';
  tableDiv.style.display = 'none';
  try {
    const res = await fetch('/api/orders', { headers: { 'Authorization': token } });
    if (!res.ok) throw new Error();
    const pedidos = await res.json();
    if (!pedidos.length) {
      loadingDiv.textContent = '📭 No hay pedidos aún.';
      loadingDiv.style.display = 'block';
      return;
    }
    tbody.innerHTML = pedidos.map(p => {
      const fecha = new Date(p.createdAt).toLocaleDateString('es-AR', {
        day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
      });
      const items = (p.items || []).map(i => `${i.nombre} x${i.qty}`).join(', ');
      const estado = p.status === 'completado'
        ? '<span style="color:var(--lime);">✅ Completado</span>'
        : '<span style="color:var(--amber);">⏳ Pendiente</span>';
      return `<tr style="border-bottom:1px solid var(--edge);">
        <td style="padding:12px 8px;color:var(--muted);">${fecha}</td>
        <td style="padding:12px 8px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escapeHtml(items)}">${escapeHtml(items)}</td>
        <td style="padding:12px 8px;color:var(--lime);">${p.total}</td>
        <td style="padding:12px 8px;">${p.paymentMethod || '—'}</td>
        <td style="padding:12px 8px;">${estado}</td>
        <td style="padding:12px 8px;text-align:center;">${p.status !== 'completado'
          ? `<button class="btn btn-sm" style="background:var(--lime);color:var(--ink);padding:6px 12px;font-size:10px;font-weight:700;" onclick="completarPedido('${p.id}')">✅ Completar</button>`
          : `<button class="btn btn-sm" style="background:transparent;color:var(--muted);padding:6px 12px;font-size:10px;border:1px solid var(--edge);" onclick="eliminarPedido('${p.id}')">🗑️</button>`
        }</td>
      </tr>`;
    }).join('');
    loadingDiv.style.display = 'none';
    tableDiv.style.display = 'block';
  } catch (err) {
    loadingDiv.textContent = '❌ Error al cargar pedidos';
    loadingDiv.style.display = 'block';
  }
}

async function completarPedido(id) {
  try {
    const res = await fetch(`/api/orders/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'Authorization': token },
      body: JSON.stringify({ status: 'completado' })
    });
    if (res.ok) { showToast('✅ Pedido completado'); cargarPedidos(); }
    else showToast('❌ Error al actualizar', true);
  } catch (err) { showToast('Error de red', true); }
}

async function eliminarPedido(id) {
  if (!confirm('¿Eliminar este pedido permanentemente?')) return;
  try {
    const res = await fetch(`/api/orders/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': token }
    });
    if (res.ok) { showToast('🗑️ Pedido eliminado'); cargarPedidos(); }
    else showToast('❌ Error al eliminar', true);
  } catch (err) { showToast('Error de red', true); }
}
